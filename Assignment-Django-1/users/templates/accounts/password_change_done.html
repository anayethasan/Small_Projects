{% extends 'base.html' %}
{% load static %}
{% block title %}Password Changed{% endblock title %}

{% block events %}
<div class="min-h-screen bg-rose-50 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md text-center">

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="h-2 bg-rose-500"></div>

            <div class="px-8 py-10">
                <div class="flex justify-center mb-5">
                    <div class="bg-rose-100 rounded-full p-6">
                        <i class="fa-solid fa-circle-check text-rose-500 text-4xl"></i>
                    </div>
                </div>

                <h1 class="text-2xl font-bold text-gray-800 mb-2">Password Changed!</h1>
                <p class="text-gray-500 text-sm mb-8">
                    Your password has been updated successfully. You can now log in with your new password.
                </p>

                <div class="flex flex-col gap-3">
                    <a href="{% url 'profile' %}"
                       class="inline-flex items-center justify-center gap-2 w-full bg-rose-500 hover:bg-rose-600 text-white font-semibold py-2.5 px-6 rounded-lg transition duration-200 shadow-sm">
                        <i class="fa-solid fa-user"></i> Go to Profile
                    </a>
                    <a href="{% url 'home' %}"
                       class="inline-flex items-center justify-center gap-2 w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 px-6 rounded-lg transition duration-200">
                        <i class="fa-solid fa-house"></i> Go to Home
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock events %}
