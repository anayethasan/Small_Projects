<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice day 2.5</title>
    
    <!-- css cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- fortawesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- style css -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1 class="title text-center mb-4">Find your favorite meal</h1>
    
    <div class="d-flex justify-content-center mt-4">
        <div class="search-box input-group">
            <input type="text" class="input-value input-box form-control search-input" placeholder="Search Your meal...">
    
            <button class="btn btn-search d-flex align-items-center justify-content-center" id="button-addon2" onclick="findMeal()">
                <span class="me-2">Search</span>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </div>
    <div class="text-center mt-2 fs-3">
        <small id="notFoundMsg" class="text-danger"></small>
    </div>

    <!-- random meals -->
    <div class="container mt-4">
        <div class="row meals"></div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="mealModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="mealModalLabel">Meal Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="modalContent"></div>
                </div>

            </div>
        </div>
    </div>



    <!-- Script files -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <script src="./index.js"></script>
</body>
</html>
